<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xpenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- HEADER -->
    <header class="fixed inset-x-0 top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
            <h1 class="text-base font-bold text-slate-800 tracking-tight">
                <i class="fas fa-wallet mr-2 text-blue-600"></i>Xpenses
            </h1>
            <nav>
                <ul class="flex items-center gap-6 text-sm font-medium text-slate-500">
                    <li><a href="#" class="hover:text-slate-800 transition-colors">Dashboard</a></li>
                    <li><a href="database.html" class="hover:text-slate-800 transition-colors">Database</a></li>
                    <li><a href="#" class="hover:text-slate-800 transition-colors">Reports</a></li>
                </ul>
            </nav>
            <div class="flex items-center gap-3">
                <button id="signInBtn" class="whenLoggedOut flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                    <i class="fab fa-google text-xs"></i> Sign in with Google
                </button>
                <div class="whenLoggedIn flex items-center gap-3">
                    <span id="userDetails" class="text-sm text-slate-500"></span>
                    <button id="signOutBtn" class="flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-slate-900 border border-slate-200 hover:border-slate-300 px-3 py-1.5 rounded-lg transition-colors">
                        <i class="fas fa-sign-out-alt text-xs"></i> Sign Out
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- LOGGED OUT -->
    <div class="whenLoggedOut flex min-h-screen items-center justify-center p-6">
        <div class="text-center max-w-sm">
            <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-wallet text-xl text-blue-600"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Welcome to Xpenses</h2>
            <p class="text-sm text-slate-500 leading-relaxed">Sign in to track your expenses and stay financially mindful about your spending.</p>
        </div>
    </div>

    <!-- MAIN -->
    <main class="hidden whenLoggedIn max-w-5xl mx-auto px-6 pt-20 pb-12">

        <!-- ADD EXPENSE -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-5">
            <h2 class="text-base font-semibold text-slate-800 mb-5 flex items-center gap-2.5">
                <span class="w-7 h-7 bg-blue-100 rounded-lg flex items-center justify-center shrink-0">
                    <i class="fas fa-plus text-blue-600 text-xs"></i>
                </span>
                Add New Expense
            </h2>
            <div class="flex flex-col gap-4">
                <div>
                    <label for="description" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Description</label>
                    <input type="text" id="description"
                        class="w-full px-3.5 py-2.5 text-sm border border-slate-200 rounded-lg bg-white placeholder:text-slate-300 text-slate-800"
                        placeholder="e.g., Lunch at restaurant">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="amount" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Amount (₹)</label>
                        <input type="number" id="amount" step="0.01"
                            class="w-full px-3.5 py-2.5 text-sm border border-slate-200 rounded-lg bg-white placeholder:text-slate-300 text-slate-800"
                            placeholder="0.00">
                    </div>
                    <div>
                        <label for="date" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Date</label>
                        <input type="date" id="date"
                            class="w-full px-3.5 py-2.5 text-sm border border-slate-200 rounded-lg bg-white text-slate-700">
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="category" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Category</label>
                        <select id="category"
                            class="w-full px-3.5 py-2.5 text-sm border border-slate-200 rounded-lg bg-white text-slate-700">
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div>
                        <label for="paymentMode" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Payment Mode</label>
                        <select id="paymentMode"
                            class="w-full px-3.5 py-2.5 text-sm border border-slate-200 rounded-lg bg-white text-slate-700">
                            <option value="">Select Payment</option>
                        </select>
                    </div>
                </div>
                <button onclick="addExpense()"
                    class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-semibold py-2.5 px-4 rounded-lg transition-colors mt-1">
                    <i class="fas fa-plus mr-2"></i>Add Expense
                </button>
            </div>
        </div>

        <!-- WEEKLY EXPENSES -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-5">

            <!-- Section header + total -->
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2.5">
                    <span class="w-7 h-7 bg-emerald-100 rounded-lg flex items-center justify-center shrink-0">
                        <i class="fas fa-list text-emerald-600 text-xs"></i>
                    </span>
                    This Week's Expenses
                </h2>
                <div class="text-right bg-emerald-50 border border-emerald-100 rounded-xl px-4 py-2">
                    <p class="text-xs font-medium text-emerald-600 mb-0.5">Total</p>
                    <p class="text-lg font-bold text-emerald-700" id="totalAmount">₹0.00</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-5">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Filter by</p>
                <div class="flex flex-wrap gap-2.5">
                    <input type="text" placeholder="Search expenses..." id="search"
                        class="flex-1 min-w-36 px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white placeholder:text-slate-300 text-slate-800">
                    <select id="categoryFilter"
                        class="px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white text-slate-700 min-w-40">
                        <option value="">All Categories</option>
                    </select>
                    <button onclick="renderExpenses()"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors whitespace-nowrap">
                        Apply
                    </button>
                    <button onclick="clearFilters()"
                        class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 border border-slate-200 hover:border-slate-300 rounded-lg transition-colors whitespace-nowrap bg-white">
                        Clear
                    </button>
                </div>
            </div>

            <!-- List -->
            <div id="expensesList" class="flex flex-col gap-2"></div>
            <p id="noExpenses" class="text-center text-sm text-slate-400 py-10">No expenses found. Add your first one above!</p>
        </div>

        <!-- CHART -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <h2 class="text-base font-semibold text-slate-800 mb-5 flex items-center gap-2.5">
                <span class="w-7 h-7 bg-violet-100 rounded-lg flex items-center justify-center shrink-0">
                    <i class="fas fa-chart-pie text-violet-600 text-xs"></i>
                </span>
                Spending by Category
            </h2>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>

    </main>

    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>

    <script src="JavaScript/main.js"></script>
    <script src="JavaScript/expenses.js"></script>
    <script src="JavaScript/firebase.js"></script>
</body>
</html>
